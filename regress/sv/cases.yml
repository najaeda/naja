cases:
  - name: black_parrot
    repo: https://github.com/black-parrot/black-parrot.git
    commit: 05ef10db21254c0b54fac4439a08de8329b05699
    top: bp_multicore
    flist: bp_top/flist.vcs
    flist_append:
      - $BP_DIR/external/basejump_stl/bsg_dataflow/bsg_fifo_1r1w_small_hardened.sv
      - $BP_DIR/external/basejump_stl/bsg_dataflow/bsg_fifo_1r1w_small_hardened_multi.sv
    output: black_parrot_naja.v
    env:
      BP_DIR: "{repo}"
      BP_ROOT: "{repo}"
    dump:
      rtl_infos_as_attributes: true
      assigns_as_instances: false
    verilator:
      image: verilator/verilator:v5.046
      timeout_seconds: 7200
      suppressions:
        - PINMISSING
        - WIDTHEXPAND
        - SELRANGE
        - MULTIDRIVEN

  - name: cva6
    repo: https://github.com/xtofalex/cva6.git
    commit: bead12b083b4457a1ae87b8b9c8812a9d64bfc54
    top: cva6
    flist: core/Flist.cva6
    output: cva6_naja.v
    env:
      CVA6_REPO_DIR: "{repo}"
      HPDCACHE_DIR: "{repo}/core/cache_subsystem/hpdcache"
      TARGET_CFG: cv64a6_imafdc_sv39
    dump:
      rtl_infos_as_attributes: true
      assigns_as_instances: true
    verilator:
      image: verilator/verilator:v5.046
      timeout_seconds: 7200
      suppressions:
        - PINMISSING
        - WIDTHEXPAND
        - SELRANGE
        - MULTIDRIVEN
