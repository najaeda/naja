  - name: axi
    repo: https://github.com/pulp-platform/axi.git
    commit: e286bb1a4aba6fc145f3cb41bd78665c5868e2a9
    top: axi_cut_top
    flist: "{artifacts}/axi.flist"
    setup_timeout_seconds: 1800
    setup_commands:
      - - python3
        - "{naja}/regress/sv/axi_flist.py"
        - "--repo"
        - "{repo}"
        - "--output"
        - "{artifacts}/axi.flist"
    output: axi_naja.v
    dump:
      rtl_infos_as_attributes: true
      assigns_as_instances: false
    verilator:
      image: verilator/verilator:v5.046
      timeout_seconds: 3600
      suppressions:
        - PINMISSING
    github_sim:
      image: verilator/verilator:v5.046
      timeout_seconds: 900
      top_module: tb_axi_cut_smoke
      sources:
        - "{repo}/src/axi_pkg.sv"
        - "{naja}/regress/sv/smoke/tb_axi_cut_smoke.sv"
      extra_args:
        - "+incdir+repo/include"
      pass_regex: "AXI_CUT_SMOKE_PASS"
      suppressions:
        - TIMESCALEMOD
        - WIDTHEXPAND
