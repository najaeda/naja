name: Ubuntu Build (Bazel)

# Bazel counterpart to ubuntu-build.yml, added additively per
# internal/bazel-migration-plan.md's Phase 8 approach: runs alongside the
# CMake job, not replacing it, until Bazel has full CI parity.
#
# DRAFT, still being validated against live Ubuntu runners -- see
# bazel/thirdparty/slang_overlay.BUILD's doc comment: slang needs
# fmt>=12.2/tomlplusplus>=3.4, both newer than (or, for tomlplusplus, not
# even packaged as) Ubuntu's apt versions (libfmt-dev is 8.1.1/22.04,
# 9.1.0/24.04; libtomlplusplus-dev doesn't exist at all on 22.04/24.04 --
# confirmed by a real `apt-get install` failure on live CI, not just
# reasoned about beforehand). slang's own CMake `find_package()` calls
# reject these as too old/missing and fall through to FetchContent's real
# network fetch (`requires-network` on slang's cmake() rule permits this,
# matching CMake's own current Ubuntu CI behavior).
#
# @fmt//:fmt (bazel/thirdparty/fmt/repo.bzl) stays pkg-config-wrapped --
# libfmt-dev is at least a real, installable apt package, so it's kept
# for now; the version mismatch against whatever slang's own build
# actually links (older apt fmt vs. a possibly-freshly-fetched newer one)
# hasn't caused a failure yet, so not preemptively "fixed" further.
#
# @tomlplusplus//:tomlplusplus is vendored instead (git_repository +
# bazel/thirdparty/tomlplusplus_overlay.BUILD in MODULE.bazel, pinned to
# the same v3.4.0 slang itself requires) -- libtomlplusplus-dev simply
# isn't apt-installable here at all, so pkg-config-wrapping a system
# package was never going to work on this platform.
#
# Single default toolchain for now (no gcc/clang matrix, unlike
# ubuntu-build.yml) -- kept simple until this job is proven to work at
# all on a live runner.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]

    steps:
    - uses: actions/checkout@v6
      # No `submodules: true` -- Bazel fetches naja-if/naja-verilog/slang
      # itself (MODULE.bazel), doesn't use the thirdparty/ checkouts.

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev \
          libfmt-dev \
          bison flex m4 pkg-config python3-dev git

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-${{ matrix.os }}
        repository-cache: true

    - name: Build
      run: bazel build //...

    - name: Test
      run: bazel test //... --test_output=errors
