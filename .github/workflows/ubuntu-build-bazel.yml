name: Ubuntu Build (Bazel)

# Bazel counterpart to ubuntu-build.yml, added additively per
# internal/bazel-migration-plan.md's Phase 8 approach: runs alongside the
# CMake job, not replacing it, until Bazel has full CI parity.
#
# DRAFT, still being validated against live Ubuntu runners -- see
# bazel/thirdparty/slang_overlay.BUILD's doc comment: slang needs
# fmt>=12.2/tomlplusplus>=3.4, both newer than (or, for tomlplusplus, not
# even packaged as) Ubuntu's apt versions (libfmt-dev is 8.1.1/22.04,
# 9.1.0/24.04; libtomlplusplus-dev doesn't exist at all on 22.04/24.04).
# slang's own CMake `find_package()` calls reject these as too old/missing
# and fall through to FetchContent's real network fetch (`requires-network`
# on slang's cmake() rule permits this, matching CMake's own current
# Ubuntu CI behavior).
#
# @fmt//:fmt and @tomlplusplus//:tomlplusplus are both vendored
# (git_repository + bazel/thirdparty/{fmt,tomlplusplus}_overlay.BUILD in
# MODULE.bazel, each pinned to the exact version slang itself requires)
# rather than pkg-config-wrapped like tbb/boost -- not installed via apt
# here at all. Found the hard way on live CI: tomlplusplus isn't
# apt-installable on either Ubuntu version at all; fmt *is* installable,
# but too old, and pkg-config-wrapping that stale apt fmt caused a real
# `fmt::v12::...` undefined-reference link failure (libsvlang.a links
# against the real fmt 12.2.0 slang's own build fetches over the
# network, not whatever old version apt has) -- vendoring both removes
# this whole category of platform-dependent version mismatch.
#
# Single default toolchain for now (no gcc/clang matrix, unlike
# ubuntu-build.yml) -- kept simple until this job is proven to work at
# all on a live runner.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]

    steps:
    - uses: actions/checkout@v7
      # No `submodules: true` -- Bazel fetches naja-if/naja-verilog/slang
      # itself (MODULE.bazel), doesn't use the thirdparty/ checkouts.

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev \
          bison flex m4 pkg-config python3-dev git

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-${{ matrix.os }}
        repository-cache: true

    - name: Build
      # --jobs=auto: Bazel already parallelizes across all local cores by
      # default (unlike make/CMake's default serial build, which is why
      # ubuntu-build.yml needs an explicit `--parallel $(nproc)`) -- spelled
      # out explicitly here for clarity/predictability rather than because
      # it's functionally required.
      run: bazel build //... --jobs=auto

    - name: Test
      run: bazel test //... --test_output=errors --jobs=auto
