name: SV simulation image

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - docker/Dockerfile.sv-sim
      - .github/workflows/sv-sim-image.yml
  pull_request:
    branches: [ main ]
    paths:
      - docker/Dockerfile.sv-sim
      - .github/workflows/sv-sim-image.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/sv-sim
  TOOL_TAG: verilator-5.048-spike-3e7bf30-xpack-14.2.0-3

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request' && github.repository == 'najaeda/naja'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SV simulation image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.sv-sim
          push: ${{ github.event_name != 'pull_request' && github.repository == 'najaeda/naja' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ env.TOOL_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
