name: asan-build

# Bazel build (see internal/bazel-migration-plan.md, Phase 8, task #27).
# Uses .bazelrc's `--config=asan`, which matches CMakeLists.txt's
# ENABLE_SANITIZERS option exactly (AddressSanitizer, -fno-omit-frame-pointer,
# -c dbg to mirror CMake's Debug build type).
#
# Forces Bazel's auto-configured local cc toolchain to clang (default local
# toolchain on these runners is gcc, unlike the CMake job which passes
# -DCMAKE_C_COMPILER=clang explicitly) -- specifically the *newest* clang-N
# already present on the runner image, not the bare `clang` alias. Found via
# live CI: Ubuntu 22.04's default `clang` package is Clang 14, and slang's
# use of std::source_location (source/../include/slang/util/Util.h) doesn't
# compile under Clang 14 + libstdc++ ("no type named 'source_location' in
# namespace std") -- a known Clang/libstdc++ compatibility gap for that
# C++20 library feature, fixed in later Clang releases. The plain CMake
# build never hit this because it never forces clang for slang's *own*
# nested build the way rules_foreign_cc's cmake() action here does (that
# nested build otherwise inherits whatever compiler Bazel is using).
#
# najaPythonPropertyTests (the one target that embeds CPython) is excluded
# from the test run, same as the old CMake job's `ctest -E ".*[p|P]ython.*"`
# / `-DPYTHON_INTERFACE=OFF` -- CPython's own allocator is known to trip
# ASan/LeakSanitizer false positives.
#
# NOTE: validated locally on macOS that --config=asan compiles and links
# every target cleanly (no code/BUILD issues). Could not validate the test
# run itself there: Apple Silicon's ASan runtime hangs indefinitely inside
# __asan::InitializeShadowMemory() (confirmed via `sample` on the hung
# process) before any test code even runs -- a known macOS/Apple-clang
# pathology, unrelated to this config or to Naja's code, and not something
# this job will hit on Linux. Needs live Ubuntu CI to confirm actual test
# results, same as valgrind.yml/coverage.yml.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev \
          bison flex m4 pkg-config python3-dev git clang

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Resolve newest available clang
      id: clang
      run: |
        cc="$(ls /usr/bin/clang-[0-9]* 2>/dev/null | grep -E '/clang-[0-9]+$' | sort -t- -k2 -n | tail -1)"
        [ -z "$cc" ] && cc=clang
        cxx="${cc/clang/clang++}"
        echo "cc=$cc" >> "$GITHUB_OUTPUT"
        echo "cxx=$cxx" >> "$GITHUB_OUTPUT"
        "$cc" --version

    - name: Build
      run: >
        bazel build --config=asan
        --repo_env=CC=${{ steps.clang.outputs.cc }} --repo_env=CXX=${{ steps.clang.outputs.cxx }}
        //... --jobs=auto

    - name: Test
      env:
        PYTHONMALLOC: malloc
      run: >
        bazel test --config=asan
        --repo_env=CC=${{ steps.clang.outputs.cc }} --repo_env=CXX=${{ steps.clang.outputs.cxx }}
        --test_output=errors --jobs=auto
        -- //... -//test/nl/python/naja_wrapping:najaPythonPropertyTests
