name: asan-build

# Bazel build (see internal/bazel-migration-plan.md, Phase 8, task #27).
# Uses .bazelrc's `--config=asan`, which matches CMakeLists.txt's
# ENABLE_SANITIZERS option exactly (AddressSanitizer, -fno-omit-frame-pointer,
# -c dbg to mirror CMake's Debug build type).
#
# --repo_env=CC=clang/CXX=clang++ forces Bazel's auto-configured local cc
# toolchain to use clang (default local toolchain on these runners is gcc,
# unlike the CMake job which passes -DCMAKE_C_COMPILER=clang explicitly).
#
# najaPythonPropertyTests (the one target that embeds CPython) is excluded
# from the test run, same as the old CMake job's `ctest -E ".*[p|P]ython.*"`
# / `-DPYTHON_INTERFACE=OFF` -- CPython's own allocator is known to trip
# ASan/LeakSanitizer false positives.
#
# NOTE: validated locally on macOS that --config=asan compiles and links
# every target cleanly (no code/BUILD issues). Could not validate the test
# run itself there: Apple Silicon's ASan runtime hangs indefinitely inside
# __asan::InitializeShadowMemory() (confirmed via `sample` on the hung
# process) before any test code even runs -- a known macOS/Apple-clang
# pathology, unrelated to this config or to Naja's code, and not something
# this job will hit on Linux. Needs live Ubuntu CI to confirm actual test
# results, same as valgrind.yml/coverage.yml.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev \
          bison flex m4 pkg-config python3-dev git clang

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Build
      run: >
        bazel build --config=asan
        --repo_env=CC=clang --repo_env=CXX=clang++
        //... --jobs=auto

    - name: Test
      env:
        PYTHONMALLOC: malloc
      run: >
        bazel test --config=asan
        --repo_env=CC=clang --repo_env=CXX=clang++
        --test_output=errors --jobs=auto
        -- //... -//test/nl/python/naja_wrapping:najaPythonPropertyTests
