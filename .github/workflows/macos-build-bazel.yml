name: macOS Build (Bazel)

# Bazel counterpart to macos-build.yml, added additively per
# internal/bazel-migration-plan.md's Phase 8 approach: runs alongside the
# CMake job, not replacing it, until Bazel has full CI parity.
#
# The dependency set and no-network cmake() build for slang
# (bazel/thirdparty/slang_overlay.BUILD) are exactly what's been
# validated locally throughout this migration on Apple Silicon -- this
# job is the first time it runs on a *fresh* macOS checkout/runner rather
# than an already-populated dev machine, so treat it as the first real
# confirmation, not a formality.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-26, macos-15]

    steps:
    - uses: actions/checkout@v6
      # No `submodules: true` -- Bazel fetches naja-if/naja-verilog/slang
      # itself (MODULE.bazel), doesn't use the thirdparty/ checkouts.

    - name: Install dependencies
      run: |
        brew install capnp tbb bison flex boost fmt tomlplusplus pkg-config

    - name: Set Homebrew paths
      # Xcode's own toolchain ships an ancient BSD bison/flex
      # (/Applications/Xcode*/.../usr/bin) that otherwise shadows
      # Homebrew's -- e.g. that bison doesn't understand GNU bison's
      # -Wconflicts-sr flag (bazel/lefdef_bison.bzl,
      # bazel/thirdparty/*/system_tool.bzl's `which("bison")` picks
      # whichever comes first on PATH). ubuntu-build.yml doesn't need
      # this; macos-build.yml (the CMake job) already does, for the same
      # reason -- this step was missing from the first draft of this
      # workflow and is why the first live run failed.
      run: |
        echo "/usr/local/opt/flex/bin" >> $GITHUB_PATH
        echo "/usr/local/opt/bison/bin" >> $GITHUB_PATH
        echo "/opt/homebrew/opt/flex/bin" >> $GITHUB_PATH
        echo "/opt/homebrew/opt/bison/bin" >> $GITHUB_PATH

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-${{ matrix.os }}
        repository-cache: true

    - name: Build
      run: bazel build //...

    - name: Test
      run: bazel test //... --test_output=errors
