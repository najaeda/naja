name: docker-build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: alpine
            dockerfile: docker/Dockerfile.alpine
            tag: latest
            build_args: ""
            naja_edit_path: /naja/naja_edit
          - distro: rockylinux8
            dockerfile: docker/Dockerfile.rockylinux
            tag: rockylinux-8
            build_args: |
              ROCKY_VERSION=8
            naja_edit_path: /naja/bin/naja_edit
          - distro: rockylinux9
            dockerfile: docker/Dockerfile.rockylinux
            tag: rockylinux-9
            build_args: |
              ROCKY_VERSION=9
            naja_edit_path: /naja/bin/naja_edit
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Install regress dependencies
        run: sudo apt-get update && sudo apt-get install -yq make rsync
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        if: github.repository == 'najaeda/naja' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build (load for test)
        uses: docker/build-push-action@v7
        with:
          load: true
          file: ${{ matrix.dockerfile }}
          tags: christophealex/naja_edit:${{ matrix.tag }}
          build-args: ${{ matrix.build_args }}
      -
        name: Run naja_edit smoke test
        run: |
          docker run --rm christophealex/naja_edit:${{ matrix.tag }} --help
          docker run --rm --entrypoint /bin/sh christophealex/naja_edit:${{ matrix.tag }} -c 'test "$(id -u)" != "0" && test -w /work'
          docker run --rm --user 12345:0 --entrypoint /bin/sh christophealex/naja_edit:${{ matrix.tag }} -c 'test "$(id -u)" = "12345" && test -w /work && ${{ matrix.naja_edit_path }} --help >/dev/null'
      -
        name: Run megaboom regress
        run: |
          make -C ${{ github.workspace }}/regress/designs/verilog/megaboom clean
          make -C ${{ github.workspace }}/regress/designs/verilog/megaboom \
            NAJA_EDIT="docker run --rm --user $(id -u):$(id -g) -v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }}/regress/designs/verilog/megaboom --entrypoint ${{ matrix.naja_edit_path }} christophealex/naja_edit:${{ matrix.tag }}"
      -
        name: Build and push
        uses: docker/build-push-action@v7
        if: github.repository == 'najaeda/naja' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          push: true
          file: ${{ matrix.dockerfile }}
          tags: christophealex/naja_edit:${{ matrix.tag }}
          build-args: ${{ matrix.build_args }}
