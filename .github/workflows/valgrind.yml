name: valgrind

# Bazel build (see internal/bazel-migration-plan.md, Phase 8, task #27).
# One `bazel test --run_under=valgrind` step per target, keeping the old
# CMake job's per-test leak-check flags (some targets get the full
# `--show-leak-kinds=all --errors-for-leak-kinds=all`, some the weaker
# `definite`-only variant, some none at all) rather than applying one
# uniform flag set to every target, since that per-target split looks
# deliberate (e.g. presumably avoiding known noisy/non-actionable leak
# reports in specific targets) rather than an oversight.
#
# Two of the old job's steps are dropped: TestSNLKernelWithPyLoader
# (snlTestsWithPyLoader) and TestSNLPyLoader (snlPyLoaderTests) both need
# naja_snl_pyloader / naja_python, which aren't wired up under Bazel yet
# (internal/bazel-migration-plan.md Phase 6 -- blocked on naja_nl's
# CMake SHARED-vs-Bazel-cc_library-static architecture mismatch). The
# already-commented-out TestReductionOpt step stays dropped too (no Bazel
# target for it either). Every other target from the old job is covered.
#
# --test_timeout is bumped well above Bazel's normal per-size defaults --
# valgrind can slow test execution down by an order of magnitude or more.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev \
          bison flex m4 pkg-config python3-dev git valgrind

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Build
      run: bazel build //... --jobs=auto

    - name: TestNajaCore
      run: >
        bazel test //test/core:najaCoreTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestSNLKernel
      run: >
        bazel test //test/nl/snl/kernel:snlTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestDecoratorsTest
      run: >
        bazel test //test/nl/snl/decorators:snlDecoratorsTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestSNLDump
      run: >
        bazel test //test/nl/snl/serialization/capnp:snlCapnPTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestSNLNetlists
      run: >
        bazel test //test/nl/netlists:snlNetlistTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestSNLVRLConstructor
      run: >
        bazel test //test/nl/formats/verilog/frontend:snlVRLConstructorTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=definite --leak-check=full --errors-for-leak-kinds=definite"
        --test_output=all --test_timeout=1200

    - name: TestLiberty
      run: >
        bazel test //test/nl/formats/liberty:snl_liberty_tests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestSNLVRLDumper
      run: >
        bazel test //test/nl/formats/verilog/backend:snlVRLDumperTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestSNLVisualsTest
      run: >
        bazel test //test/nl/visual:snl_visual_tests
        --run_under="valgrind --error-exitcode=1"
        --test_output=all --test_timeout=1200

    - name: TestDNL
      run: >
        bazel test //test/dnl:dnlTests
        --run_under="valgrind --error-exitcode=1"
        --test_output=all --test_timeout=1200

    - name: TestDLE
      run: >
        bazel test //test/logic_opt:loadlessLogicRemoverTests
        --run_under="valgrind --error-exitcode=1"
        --test_output=all --test_timeout=1200

    - name: TestConstantPropagation
      run: >
        bazel test //test/logic_opt:constantPropagationTests
        --run_under="valgrind --error-exitcode=1 --show-leak-kinds=all --leak-check=full --errors-for-leak-kinds=all"
        --test_output=all --test_timeout=1200

    - name: TestBNE
      run: >
        bazel test //test/bne:bneTests
        --run_under="valgrind --error-exitcode=1"
        --test_output=all --test_timeout=1200
