name: coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          clang llvm \
          libboost-dev libfl-dev \
          capnproto libcapnp-dev \
          libtbb-dev \
          lcov

    - name: Set up llvm-cov gcov wrapper
      run: |
        cat > ${{ runner.temp }}/llvm-gcov <<'EOF'
        #!/usr/bin/env bash
        exec llvm-cov gcov "$@"
        EOF
        chmod +x ${{ runner.temp }}/llvm-gcov

    - name: Configure CMake
      run: |
        cmake -B ${{ github.workspace }}/build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCODE_COVERAGE=ON \
          -DLONG_TESTS=ON

    - name: Build
      run: |
        cmake --build ${{ github.workspace }}/build \
          -j $(nproc) \
          --config ${{ env.BUILD_TYPE }}

    - name: Test
      working-directory: ${{ github.workspace }}/build
      run: ctest -VV -C ${{ env.BUILD_TYPE }}

    - name: Generate coverage
      working-directory: ${{ github.workspace }}/build
      run: |
        LCOV_IGNORE_ERRORS='inconsistent,unsupported,mismatch,count,format,unused,corrupt,negative'
        LCOV_RC_ARGS='--rc geninfo_unexecuted_blocks=1 --gcov-tool ${{ runner.temp }}/llvm-gcov'
        lcov ${LCOV_RC_ARGS} --ignore-errors ${LCOV_IGNORE_ERRORS} \
          --directory . --capture --output-file coverage.info
        lcov ${LCOV_RC_ARGS} --ignore-errors ${LCOV_IGNORE_ERRORS} \
          --remove coverage.info --output-file coverage.info \
          '/usr/*' \
          '*/test/*' \
          '*/build/*' \
          '*/src/apps/*' \
          '*/src/app_snippet/*' \
          '*/src/nl/formats/lefdef/*' \
          '*/src/nl/snippets/*' \
          '*/thirdparty/*'
        lcov ${LCOV_RC_ARGS} --ignore-errors ${LCOV_IGNORE_ERRORS} --summary coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        fail_ci_if_error: true
        files: ${{ github.workspace }}/build/coverage.info
        disable_search: true
        flags: unittests
        name: codecov-umbrella
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
