name: coverage

# Bazel build (see internal/bazel-migration-plan.md, Phase 8, task #27).
# Uses Bazel's native `bazel coverage` (LLVM source-based coverage, clang's
# -fprofile-instr-generate/-fcoverage-mapping) instead of CMake's manual
# CODE_COVERAGE=ON + llvm-cov-gcov-wrapper + lcov dance -- `bazel coverage
# --combined_report=lcov` produces an lcov report directly, attributed back
# to workspace-relative source paths regardless of Bazel's hermetic/sandboxed
# build layout, which is what that manual approach existed to work around.
#
# Required env for clang's LLVM-native coverage mode (undocumented outside
# Bazel's own tools/test/collect_cc_coverage.sh -- discovered by reading it):
#   CC / CXX                      clang / clang++
#   BAZEL_USE_LLVM_NATIVE_COVERAGE=1
#   GCOV=<path to llvm-profdata>  merges the raw .profraw files
#   LLVM_COV=<path to llvm-cov>   exports the merged profile to lcov format
#   --experimental_generate_llvm_lcov   actually runs that export step
#     (without it, Bazel emits raw, unmerged profile data and a silent
#     "no coverage found" from the report generator instead of an error)
#
# --instrumentation_filter="^//src[/:]" limits instrumentation (and thus
# the report) to library code under src/, mirroring CMake's lcov --remove
# exclusion list for test/build/thirdparty -- coarser than that list (it
# doesn't carve out src/apps, src/app_snippet, src/nl/formats/lefdef, or
# src/nl/snippets the way the old job's lcov step did), which is an
# accepted, deliberate scope reduction for this first migration pass.
#
# --define=isolated_tests=true activates test/...'s per-target
# shard_count (see bazel/BUILD.bazel's isolated_tests config_setting and
# .bazelrc's --config=asan/tsan, which set the same define): this job's
# old CMake equivalent ran every TEST_F in its own ctest process
# (GTEST_DISCOVER_TESTS), unlike Bazel's default of one process per whole
# cc_test binary. Bazel merges coverage data across shards the same way
# it merges across separate test targets, so this doesn't change what the
# combined report covers -- only how many processes get there.
#
# NOTE: local validation on macOS got the instrumentation and the
# llvm-profdata merge step working (confirmed real, non-empty raw profile
# data), but the final llvm-cov lcov export produced an empty report in
# that environment (Xcode's bundled clang toolchain, not apt's) -- couldn't
# get real coverage numbers out locally despite matching Bazel's documented
# recipe plus the LLVM_COV wiring above. Ubuntu's apt clang+llvm packages
# are a much more standard combination for this Bazel feature; treat this
# job the same as valgrind.yml -- needs live CI to confirm it actually
# produces non-zero coverage, not just that the job runs green.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev \
          bison flex m4 pkg-config python3-dev git \
          clang llvm

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Resolve newest available clang
      # See asan-build.yml's comment on this same step: forces the newest
      # clang-N already on the runner image rather than the bare `clang`
      # alias, which on some Ubuntu releases is too old for slang's use of
      # std::source_location against libstdc++. Resolves the matching
      # llvm-profdata-N/llvm-cov-N alongside it so the coverage tools are
      # the same version as the compiler, not whatever the bare
      # llvm-profdata/llvm-cov names happen to default to.
      id: clang
      run: |
        cc="$(ls /usr/bin/clang-[0-9]* 2>/dev/null | grep -E '/clang-[0-9]+$' | sort -t- -k2 -n | tail -1)"
        [ -z "$cc" ] && cc=clang
        cxx="${cc/clang/clang++}"
        ver_suffix="${cc#/usr/bin/clang}"
        profdata="/usr/bin/llvm-profdata${ver_suffix}"
        [ -x "$profdata" ] || profdata="$(command -v llvm-profdata)"
        cov="/usr/bin/llvm-cov${ver_suffix}"
        [ -x "$cov" ] || cov="$(command -v llvm-cov)"
        echo "cc=$cc" >> "$GITHUB_OUTPUT"
        echo "cxx=$cxx" >> "$GITHUB_OUTPUT"
        echo "profdata=$profdata" >> "$GITHUB_OUTPUT"
        echo "cov=$cov" >> "$GITHUB_OUTPUT"
        "$cc" --version
        "$profdata" --version
        "$cov" --version

    - name: Generate coverage
      env:
        CC: ${{ steps.clang.outputs.cc }}
        CXX: ${{ steps.clang.outputs.cxx }}
        BAZEL_USE_LLVM_NATIVE_COVERAGE: 1
        GCOV: ${{ steps.clang.outputs.profdata }}
        LLVM_COV: ${{ steps.clang.outputs.cov }}
      run: |
        bazel coverage //... \
          --repo_env=CC="${CC}" --repo_env=CXX="${CXX}" \
          --combined_report=lcov \
          --experimental_generate_llvm_lcov \
          --instrumentation_filter="^//src[/:]" \
          --action_env=LLVM_COV="${LLVM_COV}" \
          --test_env=LLVM_COV="${LLVM_COV}" \
          --define=isolated_tests=true \
          --test_output=errors --jobs=auto
        cp bazel-out/_coverage/_coverage_report.dat coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      if: github.repository == 'najaeda/naja' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      with:
        fail_ci_if_error: true
        files: ${{ github.workspace }}/coverage.info
        disable_search: true
        flags: unittests
        name: codecov-umbrella
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
