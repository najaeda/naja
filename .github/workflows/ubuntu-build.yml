name: Ubuntu Build

# Bazel build (see internal/bazel-migration-plan.md, Phase 8, task #26).
# Replaced the CMake-based version of this workflow once this job was
# validated green on live Ubuntu 22.04/24.04 runners.
#
# @fmt//:fmt and @tomlplusplus//:tomlplusplus are vendored (git_repository
# + bazel/thirdparty/{fmt,tomlplusplus}_overlay.BUILD in MODULE.bazel,
# each pinned to the exact version slang itself requires) rather than
# pkg-config-wrapped like tbb/boost -- not installed via apt here at all.
# Found the hard way on live CI: tomlplusplus isn't apt-installable on
# either Ubuntu version at all; fmt *is* installable, but too old
# (libfmt-dev is 8.1.1/22.04, 9.1.0/24.04, both below slang's `fmt>=12.2`
# requirement), and pkg-config-wrapping that stale apt fmt caused a real
# `fmt::v12::...` undefined-reference link failure (libsvlang.a links
# against the real fmt 12.2.0 slang's own build fetches over the network
# when its `find_package()` rejects the old apt one -- `requires-network`
# on slang's cmake() rule permits that fetch). Vendoring both removes
# this whole category of platform-dependent version mismatch.
#
# Single default toolchain for now (no gcc/clang matrix, unlike the old
# CMake job) -- kept simple until there's a concrete reason to add it back.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]

    steps:
    - uses: actions/checkout@v7
      # No `submodules: true` -- Bazel fetches naja-if/naja-verilog/slang
      # itself (MODULE.bazel), doesn't use the thirdparty/ checkouts.

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -yq \
          libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev \
          bison flex m4 pkg-config python3-dev git

    - uses: bazel-contrib/setup-bazel@0.8.1
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}-${{ matrix.os }}
        repository-cache: true

    - name: Build
      # --jobs=auto: Bazel already parallelizes across all local cores by
      # default (unlike make/CMake's default serial build) -- spelled out
      # explicitly here for clarity/predictability rather than because
      # it's functionally required.
      run: bazel build //... --jobs=auto

    - name: Test
      run: bazel test //... --test_output=errors --jobs=auto
