name: External SV Regress

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sv-regress:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq libboost-dev libfl-dev capnproto libcapnp-dev libtbb-dev
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml fusesoc

      - name: Configure CMake
        run: |
          cmake -B ${{ github.workspace }}/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SANITIZERS=OFF \
            -DLONG_TESTS=OFF \
            -DPython3_EXECUTABLE=$(which python3)

      - name: Build naja Python module
        run: cmake --build ${{ github.workspace }}/build --target naja --config Release -j$(nproc)

      - name: Prepare najaeda Python package for script execution
        run: |
          mkdir -p ${{ github.workspace }}/build/test/najaeda
          cp -R \
            ${{ github.workspace }}/src/najaeda/najaeda \
            ${{ github.workspace }}/build/test/najaeda/
          ln -sf ${{ github.workspace }}/build/src/nl/python/naja_wrapping/naja.so \
            ${{ github.workspace }}/build/test/najaeda/najaeda/naja.so

      - name: Run external SV regress lint
        run: python3 ${{ github.workspace }}/regress/sv/sv_regress.py run --case ibex

      - name: Upload SV regress artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sv-regress-artifacts
          path: ${{ github.workspace }}/build/sv-regress
