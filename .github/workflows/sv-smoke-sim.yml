name: External SV Smoke Simulation

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sv-smoke-sim:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq \
            binutils-riscv64-unknown-elf \
            gcc-riscv64-unknown-elf \
            libboost-dev \
            libcapnp-dev \
            libfl-dev \
            libtbb-dev \
            capnproto
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml fusesoc

      - name: Set up Verilator 5.046 wrapper
        run: |
          mkdir -p "${HOME}/.local/bin"
          cat > "${HOME}/.local/bin/verilator" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${PWD}" \
            verilator/verilator:v5.046 \
            "$@"
          EOF
          chmod +x "${HOME}/.local/bin/verilator"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Configure CMake
        run: |
          cmake -B ${{ github.workspace }}/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SANITIZERS=OFF \
            -DLONG_TESTS=OFF \
            -DPython3_EXECUTABLE=$(which python3)

      - name: Build naja Python module
        run: cmake --build ${{ github.workspace }}/build --target naja --config Release -j$(nproc)

      - name: Prepare najaeda Python package for script execution
        run: |
          mkdir -p ${{ github.workspace }}/build/test/najaeda
          cp -R \
            ${{ github.workspace }}/src/najaeda/najaeda \
            ${{ github.workspace }}/build/test/najaeda/
          ln -sf ${{ github.workspace }}/build/src/nl/python/naja_wrapping/naja.so \
            ${{ github.workspace }}/build/test/najaeda/najaeda/naja.so

      - name: Run external SV smoke simulations
        run: python3 ${{ github.workspace }}/regress/sv/sv_regress.py run --case ibex --case cv32e40p --stage github_sim

      - name: Run Ibex hello local simulation
        run: |
          python3 ${{ github.workspace }}/regress/sv/sv_regress.py run \
            --case ibex \
            --stage local_sim \
            --require-local-sim-tools

      - name: Upload SV smoke simulation artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sv-smoke-sim-artifacts
          path: ${{ github.workspace }}/build/sv-regress
